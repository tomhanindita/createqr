<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Link QR — Elegant Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --paper: #FBFAF8;
            --paper-deep: #F3F0E9;
            --ink: #1C1A17;
            --ink-soft: #6B6560;
            --hairline: #E5E0D8;
            --glass: rgba(255, 255, 255, 0.55);
            --glass-strong: rgba(255, 255, 255, 0.78);
            --accent: #8C6A3F;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background:
                radial-gradient(circle at 15% 0%, rgba(255, 255, 255, 0.9) 0%, transparent 45%),
                linear-gradient(160deg, var(--paper) 0%, var(--paper-deep) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, sans-serif;
            padding: 1.5rem;
            margin: 0;
            color: var(--ink);
        }

        .card-container {
            max-width: 420px;
            width: 100%;
        }

        /* ---------- Card shell ---------- */
        .card-qr {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(28px) saturate(140%);
            -webkit-backdrop-filter: blur(28px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 1.5rem;
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.8) inset,
                0 30px 60px -25px rgba(28, 26, 23, 0.18);
            padding: 2.75rem 2.25rem 2rem;
            width: 100%;
            text-align: center;
            transition: box-shadow 0.6s ease;
            overflow: hidden;
        }

        /* faint hairline accent arc behind content, brand-tinted */
        .card-qr::before {
            content: "";
            position: absolute;
            inset: -40% -40% auto -40%;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--brand-glow, rgba(140, 106, 63, 0.12)) 0%, transparent 70%);
            transition: background 0.6s ease;
            pointer-events: none;
        }

        .eyebrow {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin-bottom: 0.6rem;
            display: block;
        }

        .main-title {
            font-family: 'Fraunces', serif;
            font-size: 1.85rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 2.1rem;
            color: var(--ink);
            transition: color 0.5s ease;
            line-height: 1.15;
        }

        /* ---------- Result toggle ---------- */
        .qr-result-section {
            display: none;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .qr-result-section.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .qr-wrapper {
            background: #ffffff;
            padding: 1.4rem;
            border-radius: 1.25rem;
            display: inline-block;
            box-shadow: 0 20px 40px -20px rgba(28, 26, 23, 0.12);
            margin-bottom: 1.4rem;
            position: relative;
            border: 1px solid var(--hairline);
        }

        #qrcode img,
        #qrcode canvas {
            max-width: 100%;
            height: auto;
            display: inline-block;
            border-radius: 0.4rem;
        }

        /* small brand mark, corner badge instead of center overlay
           keeps QR scan integrity intact */
        .brand-badge {
            position: absolute;
            bottom: -10px;
            right: -10px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #ffffff;
            border: 1px solid var(--hairline);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 18px -8px rgba(28, 26, 23, 0.2);
        }

        .brand-badge i {
            font-size: 1.05rem;
            transition: color 0.4s ease;
        }

        .brand-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin-bottom: 1rem;
            display: block;
        }

        .link-out {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            background: var(--glass-strong);
            padding: 0.55rem 1.1rem;
            border-radius: 0.6rem;
            color: var(--ink-soft);
            border: 1px solid var(--hairline);
            max-width: 100%;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.75rem;
        }

        .link-out i {
            font-size: 0.9rem;
            opacity: 0.6;
        }

        /* ---------- Input area ---------- */
        .input-section {
            transition: all 0.3s ease;
        }

        .input-group-custom {
            background: var(--glass-strong);
            border-radius: 1.1rem;
            padding: 0.35rem;
            border: 1px solid var(--hairline);
            box-shadow: inset 0 1px 2px rgba(28, 26, 23, 0.03);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 0.35rem;
        }

        .input-group-custom:focus-within {
            border-color: rgba(140, 106, 63, 0.45);
            box-shadow: 0 0 0 3px rgba(140, 106, 63, 0.1);
        }

        .input-group-custom textarea {
            border: none;
            background: transparent;
            padding: 0.65rem 0.7rem;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            width: 100%;
            min-width: 0;
            color: var(--ink);
            resize: none;
            overflow: hidden;
            line-height: 1.4;
            word-break: break-all;
            max-height: 6.5em;
        }

        .input-group-custom textarea::placeholder {
            color: #A8A29B;
            font-family: 'Inter', sans-serif;
        }

        /* ---------- Buttons ---------- */
        .btn-custom {
            border-radius: 0.7rem;
            padding: 0.65rem 1.4rem;
            font-weight: 600;
            font-size: 0.88rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: none;
            white-space: nowrap;
        }

        .btn-generate {
            background: var(--ink);
            color: #ffffff;
            flex-shrink: 0;
            margin: 0.2rem;
        }

        .btn-generate:hover {
            background: #000000;
        }

        .btn-generate:active {
            transform: scale(0.97);
        }

        .btn-download {
            width: 100%;
            color: white;
            box-shadow: 0 10px 25px -12px rgba(28, 26, 23, 0.3);
            background: var(--brand-color, var(--accent));
        }

        .btn-download:hover {
            filter: brightness(0.94);
        }

        .btn-download:active {
            transform: scale(0.99);
        }

        .btn-reset {
            background: transparent;
            color: var(--ink-soft);
            font-size: 0.85rem;
            text-decoration: none;
            margin-top: 1.2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: color 0.2s ease;
        }

        .btn-reset:hover {
            color: var(--ink);
        }

        /* ---------- Footer ---------- */
        .footer-note {
            font-size: 0.72rem;
            color: var(--ink-soft);
            margin-top: 2.25rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            opacity: 0.85;
        }

        .footer-note strong {
            color: var(--ink);
            font-weight: 600;
        }

        #downloadCanvas {
            display: none;
        }

        /* ---------- Focus visibility (a11y) ---------- */
        button:focus-visible,
        a:focus-visible,
        input:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                transition: none !important;
                animation: none !important;
            }
        }

        @media (max-width: 480px) {
            .card-qr {
                padding: 2.25rem 1.5rem 1.75rem;
            }

            .input-group-custom {
                flex-direction: column;
                border-radius: 1rem;
                padding: 0.6rem;
            }

            .input-group-custom textarea {
                text-align: center;
            }

            .btn-generate {
                width: 100%;
            }
        }

    </style>
</head>

<body>
    <div class="card-container">
        <div class="card-qr" id="mainCard">
            <span class="eyebrow">QR Studio</span>
            <div class="main-title" id="cardTitle">Smart Link to QR</div>

            <div class="input-section" id="inputSection">
                <div class="input-group-custom">
                    <textarea id="urlInput" placeholder="Tempel tautan di sini…" autocomplete="off" spellcheck="false"
                        rows="1"></textarea>
                    <button class="btn-custom btn-generate" id="generateBtn">
                        Generate
                    </button>
                </div>
            </div>

            <div class="qr-result-section" id="qrResultSection">
                <span class="brand-label" id="brandLabel">Smart Link QR</span>

                <div class="qr-wrapper">
                    <div id="qrcode"></div>
                    <div class="brand-badge" id="brandBadge">
                        <i id="brandIcon" class="bi bi-link-45deg"></i>
                    </div>
                </div>

                <div class="link-out">
                    <i class="bi bi-link-45deg"></i>
                    <span id="linkText">your-link.com</span>
                </div>

                <button class="btn-custom btn-download mb-1" id="downloadBtn">
                    <i class="bi bi-download"></i> Unduh PNG
                </button>

                <br>
                <a href="#" class="btn-reset" id="resetBtn">
                    <i class="bi bi-arrow-left"></i> Buat tautan baru
                </a>
            </div>

            <div class="footer-note">
                Dibuat dengan 💖 oleh <strong>tdsquad</strong> · 2026
            </div>
        </div>
    </div>

    <canvas id="downloadCanvas" width="600" height="1050"></canvas>

    <script>
        (function () {
            // DATABASE CONFIGURATION BRAND MAPPER
            const BRANDS = {
                limewire: {
                    key: "limewire",
                    name: "Limewire QR",
                    primaryColor: "#1E8A3D",
                    glow: "rgba(30, 138, 61, 0.14)",
                    iconClass: "bi-lightning-charge-fill"
                },
                youtube: {
                    key: "youtube",
                    name: "YouTube to QR",
                    primaryColor: "#C4281C",
                    glow: "rgba(196, 40, 28, 0.14)",
                    iconClass: "bi-play-btn-fill"
                },
                instagram: {
                    key: "instagram",
                    name: "Instagram QR",
                    primaryColor: "#B23A66",
                    glow: "rgba(178, 58, 102, 0.14)",
                    iconClass: "bi-instagram"
                },
                tiktok: {
                    key: "tiktok",
                    name: "TikTok to QR",
                    primaryColor: "#0F8A93",
                    glow: "rgba(15, 138, 147, 0.14)",
                    iconClass: "bi-tiktok"
                },
                spotify: {
                    key: "spotify",
                    name: "Spotify to QR",
                    primaryColor: "#16793F",
                    glow: "rgba(22, 121, 63, 0.14)",
                    iconClass: "bi-spotify"
                },
                default: {
                    key: "default",
                    name: "Smart Link QR",
                    primaryColor: "#8C6A3F",
                    glow: "rgba(140, 106, 63, 0.12)",
                    iconClass: "bi-link-45deg"
                }
            };

            let activeBrand = BRANDS.default;
            let ytMeta = null; // { title, author } populated only for YouTube links
            let lastGeneratedUrl = ''; // raw URL used to regenerate a high-res QR on export

            // DOM Elements Mapping
            const mainCard = document.getElementById('mainCard');
            const inputSection = document.getElementById('inputSection');
            const qrResultSection = document.getElementById('qrResultSection');
            const cardTitle = document.getElementById('cardTitle');
            const brandLabel = document.getElementById('brandLabel');

            const qrContainer = document.getElementById('qrcode');
            const linkTextSpan = document.getElementById('linkText');
            const urlInput = document.getElementById('urlInput');

            const brandIcon = document.getElementById('brandIcon');
            const generateBtn = document.getElementById('generateBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const resetBtn = document.getElementById('resetBtn');
            const downloadCanvas = document.getElementById('downloadCanvas');
            const ctx = downloadCanvas.getContext('2d');

            // Auto-resize textarea as the pasted link wraps to new lines
            function autoResizeInput() {
                urlInput.style.height = 'auto';
                urlInput.style.height = urlInput.scrollHeight + 'px';
            }
            urlInput.addEventListener('input', autoResizeInput);

            // Regex String Parser Detector
            function detectBrand(url) {
                const lower = url.toLowerCase();
                if (lower.includes('limewire.com')) return BRANDS.limewire;
                if (lower.includes('youtube.com') || lower.includes('youtu.be')) return BRANDS.youtube;
                if (lower.includes('instagram.com')) return BRANDS.instagram;
                if (lower.includes('tiktok.com')) return BRANDS.tiktok;
                if (lower.includes('spotify.com')) return BRANDS.spotify;
                return BRANDS.default;
            }

            // Fetch YouTube video title + channel name via the public oEmbed
            // endpoint. No API key required; returns null on any failure
            // (private/invalid video, network issue, etc.) so callers can
            // gracefully fall back to the generic brand title.
            async function fetchYoutubeMeta(url) {
                try {
                    const oembedUrl =
                        `https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`;
                    const res = await fetch(oembedUrl);
                    if (!res.ok) return null;
                    const data = await res.json();
                    if (!data || !data.title) return null;
                    return {
                        title: data.title,
                        author: data.author_name || ''
                    };
                } catch (err) {
                    return null;
                }
            }

            // Real-time Dynamic QR Generator
            function generateDynamicQR(text, brandConfig, meta) {
                qrContainer.innerHTML = '';
                lastGeneratedUrl = text;

                new QRCode(qrContainer, {
                    text: text,
                    width: 220,
                    height: 220,
                    colorDark: '#1C1A17',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });

                // URL Text String Shortener
                let displayText = text.replace(/^https?:\/\/(www\.)?/, '');
                if (displayText.length > 30) displayText = displayText.substring(0, 27) + '…';
                linkTextSpan.textContent = displayText;

                // Sync UI Themes
                document.documentElement.style.setProperty('--brand-color', brandConfig.primaryColor);
                document.documentElement.style.setProperty('--brand-glow', brandConfig.glow);

                if (meta && meta.title) {
                    // Show the actual video title as the card heading, and the
                    // channel name as the small label above the QR code.
                    cardTitle.textContent = meta.title;
                    brandLabel.textContent = meta.author ? `YouTube · ${meta.author}` : brandConfig.name;
                } else {
                    cardTitle.textContent = brandConfig.name;
                    brandLabel.textContent = brandConfig.name;
                }

                // Inject Icon Classes
                brandIcon.className = `bi ${brandConfig.iconClass}`;
                brandIcon.style.color = brandConfig.primaryColor;
            }

            // Generate Button Click Action
            generateBtn.addEventListener('click', async function (e) {
                e.preventDefault();
                const rawUrl = urlInput.value.trim();

                if (!rawUrl) {
                    Swal.fire({
                        icon: 'info',
                        title: 'Info',
                        text: 'Silakan tempel atau ketik tautan link Anda.',
                        confirmButtonColor: '#1C1A17'
                    });
                    return;
                }

                activeBrand = detectBrand(rawUrl);
                ytMeta = null;

                const originalBtnHtml = generateBtn.innerHTML;

                if (activeBrand.key === 'youtube') {
                    generateBtn.disabled = true;
                    generateBtn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Mengambil info…';
                    ytMeta = await fetchYoutubeMeta(rawUrl);
                    generateBtn.disabled = false;
                    generateBtn.innerHTML = originalBtnHtml;
                }

                generateDynamicQR(rawUrl, activeBrand, ytMeta);

                Swal.fire({
                    icon: 'success',
                    title: 'QR Code Terbuat!',
                    text: ytMeta && ytMeta.title ?
                        `Berhasil mengambil info video: ${ytMeta.title}` :
                        `Berhasil menyesuaikan dengan tema ${activeBrand.name}.`,
                    showConfirmButton: false,
                    timer: 1400
                });

                inputSection.style.display = 'none';
                qrResultSection.classList.add('show');
            });

            // Back / Reset Application State Handler
            resetBtn.addEventListener('click', function (e) {
                e.preventDefault();
                urlInput.value = '';
                urlInput.style.height = 'auto';
                ytMeta = null;
                lastGeneratedUrl = '';

                qrResultSection.classList.remove('show');
                setTimeout(() => {
                    inputSection.style.display = 'block';
                    document.documentElement.style.setProperty('--brand-color', BRANDS.default
                        .primaryColor);
                    document.documentElement.style.setProperty('--brand-glow', BRANDS.default.glow);
                    cardTitle.textContent = BRANDS.default.name;
                    urlInput.focus();
                }, 350);
            });

            // High-Resolution Export Engine Image Composer
            function downloadDinamisPNG() {
                if (!lastGeneratedUrl) return;

                // Render a fresh, high-resolution QR code specifically for
                // export. Reusing the on-screen QR (sized for ~220px display)
                // would look blurry once scaled up for a crisp, printable PNG.
                const qrExportHolder = document.createElement('div');
                qrExportHolder.style.position = 'absolute';
                qrExportHolder.style.left = '-9999px';
                document.body.appendChild(qrExportHolder);

                new QRCode(qrExportHolder, {
                    text: lastGeneratedUrl,
                    width: 960,
                    height: 960,
                    colorDark: '#1C1A17',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });

                const qrCanvas = qrExportHolder.querySelector('canvas');
                if (!qrCanvas) {
                    document.body.removeChild(qrExportHolder);
                    return;
                }

                // Logical layout: compact, near-square canvas (easy to drop
                // into a Word document without dominating the page), with no
                // link-text block. SCALE renders everything at 3x pixel
                // density so the PNG stays crisp when zoomed, printed, or
                // resized.
                const w = 480;
                const h = 680;
                const SCALE = 3;
                downloadCanvas.width = w * SCALE;
                downloadCanvas.height = h * SCALE;
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(SCALE, SCALE);

                // Outer card border: a solid, clearly visible boundary so the
                // graphic still reads as a distinct card when pasted onto a
                // plain white page (Word/PowerPoint), instead of blending in.
                const cardMargin = 12;
                const cardRadius = 28;

                ctx.save();
                ctx.fillStyle = '#FBFAF8';
                ctx.beginPath();
                ctx.roundRect(cardMargin, cardMargin, w - cardMargin * 2, h - cardMargin * 2, cardRadius);
                ctx.fill();
                ctx.lineWidth = 2.5;
                ctx.strokeStyle = '#D8D2C6';
                ctx.stroke();
                ctx.restore();

                // Anything drawn outside the rounded card area should not
                // show, so clip to it before painting the rest of the scene.
                ctx.save();
                ctx.beginPath();
                ctx.roundRect(cardMargin, cardMargin, w - cardMargin * 2, h - cardMargin * 2, cardRadius);
                ctx.clip();

                // Soft brand glow top
                const gradientEfek = ctx.createRadialGradient(w / 2, 70, 10, w / 2, 70, 340);
                gradientEfek.addColorStop(0, activeBrand.primaryColor + "22");
                gradientEfek.addColorStop(1, "transparent");
                ctx.fillStyle = gradientEfek;
                ctx.fillRect(cardMargin, cardMargin, w - cardMargin * 2, h - cardMargin * 2);

                // Eyebrow label
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#6B6560';
                ctx.font = '600 14px "JetBrains Mono", monospace';
                ctx.fillText(ytMeta && ytMeta.title ? 'YOUTUBE' : 'QR STUDIO', w / 2, 64);

                // Title block: video title + channel name for YouTube,
                // generic "Pindai QR Code" instruction for everything else.
                // Canvas fillText doesn't auto-wrap, so long titles are
                // wrapped manually onto up to 2 lines before truncating.
                function wrapCanvasText(text, font, maxWidth, maxLines) {
                    ctx.font = font;
                    const words = text.split(/\s+/);
                    const lines = [];
                    let current = '';

                    for (const word of words) {
                        const test = current ? current + ' ' + word : word;
                        if (ctx.measureText(test).width > maxWidth && current) {
                            lines.push(current);
                            current = word;
                            if (lines.length === maxLines - 1) break;
                        } else {
                            current = test;
                        }
                    }
                    if (current) lines.push(current);

                    // Truncate the last line with an ellipsis if words remain
                    const consumed = lines.join(' ').split(/\s+/).length;
                    if (consumed < words.length) {
                        let last = lines[lines.length - 1];
                        while (ctx.measureText(last + '…').width > maxWidth && last.length > 1) {
                            last = last.slice(0, -1);
                        }
                        lines[lines.length - 1] = last.trimEnd() + '…';
                    }
                    return lines;
                }

                let titleBottomY;

                if (ytMeta && ytMeta.title) {
                    const titleFont = '600 28px Georgia, "Times New Roman", serif';
                    const lines = wrapCanvasText(ytMeta.title, titleFont, 400, 2);

                    ctx.fillStyle = '#1C1A17';
                    ctx.font = titleFont;
                    const startY = lines.length > 1 ? 110 : 122;
                    lines.forEach((line, i) => {
                        ctx.fillText(line, w / 2, startY + i * 36);
                    });
                    titleBottomY = startY + (lines.length - 1) * 36;

                    if (ytMeta.author) {
                        ctx.fillStyle = '#6B6560';
                        ctx.font = '500 16px Inter, sans-serif';
                        ctx.fillText(ytMeta.author, w / 2, titleBottomY + 32);
                        titleBottomY += 32;
                    }
                } else {
                    ctx.fillStyle = '#1C1A17';
                    ctx.font = '500 34px Georgia, "Times New Roman", serif';
                    ctx.fillText('Pindai QR Code', w / 2, 124);
                    titleBottomY = 124;
                }

                // QR Holder Plate — fixed at 363x376 as requested. The QR
                // code itself is drawn as a centered square (using the
                // smaller dimension) so it never distorts, with a touch of
                // extra bottom padding inside the plate.
                const plateW = 363;
                const plateH = 376;
                const plateX = (w - plateW) / 2;
                const plateY = titleBottomY + 60;
                const qrSize = plateW - 56;
                const qrX = plateX + (plateW - qrSize) / 2;
                const qrY = plateY + (plateH - qrSize) / 2 - 6;

                ctx.save();
                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = '#E5E0D8';
                ctx.lineWidth = 1;
                ctx.shadowColor = 'rgba(28, 26, 23, 0.08)';
                ctx.shadowBlur = 36;
                ctx.shadowOffsetY = 14;
                ctx.beginPath();
                ctx.roundRect(plateX, plateY, plateW, plateH, 28);
                ctx.fill();
                ctx.stroke();
                ctx.restore();

                // Draw QR Pattern Matrix
                ctx.drawImage(qrCanvas, qrX, qrY, qrSize, qrSize);

                // Corner brand badge (kept outside QR matrix to preserve scannability)
                const badgeR = 22;
                const badgeX = plateX + plateW - 14;
                const badgeY = plateY + plateH - 14;

                ctx.save();
                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = '#E5E0D8';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(badgeX, badgeY, badgeR, 0, 2 * Math.PI);
                ctx.fill();
                ctx.stroke();

                // Draw a vector glyph per brand directly on canvas
                // (icon webfonts are not reliably available inside canvas rendering)
                ctx.translate(badgeX, badgeY);
                ctx.fillStyle = activeBrand.primaryColor;
                ctx.strokeStyle = activeBrand.primaryColor;

                switch (activeBrand.key) {
                    case 'limewire':
                        // lightning bolt
                        ctx.beginPath();
                        ctx.moveTo(2, -12);
                        ctx.lineTo(-7, 2);
                        ctx.lineTo(-1, 2);
                        ctx.lineTo(-3, 12);
                        ctx.lineTo(8, -2);
                        ctx.lineTo(1, -2);
                        ctx.closePath();
                        ctx.fill();
                        break;
                    case 'youtube':
                        // play triangle
                        ctx.beginPath();
                        ctx.moveTo(-7, -10);
                        ctx.lineTo(-7, 10);
                        ctx.lineTo(10, 0);
                        ctx.closePath();
                        ctx.fill();
                        break;
                    case 'instagram':
                        // rounded square camera outline
                        ctx.lineWidth = 2.4;
                        ctx.beginPath();
                        ctx.roundRect(-10, -10, 20, 20, 6);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.arc(0, 0, 5, 0, 2 * Math.PI);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.arc(7, -7, 1.6, 0, 2 * Math.PI);
                        ctx.fill();
                        break;
                    case 'tiktok':
                        // musical note
                        ctx.beginPath();
                        ctx.arc(-4, 7, 5, 0, 2 * Math.PI);
                        ctx.fill();
                        ctx.fillRect(1, -11, 3, 18);
                        ctx.beginPath();
                        ctx.moveTo(4, -11);
                        ctx.quadraticCurveTo(11, -10, 11, -2);
                        ctx.lineTo(8, -2);
                        ctx.quadraticCurveTo(8, -8, 4, -8);
                        ctx.closePath();
                        ctx.fill();
                        break;
                    case 'spotify':
                        // three soundwave arcs
                        ctx.lineWidth = 2.2;
                        ctx.lineCap = 'round';
                        for (let r = 5; r <= 11; r += 3) {
                            ctx.beginPath();
                            ctx.arc(-2, 4, r, Math.PI * 1.15, Math.PI * 1.85);
                            ctx.stroke();
                        }
                        break;
                    default:
                        // generic link glyph
                        ctx.lineWidth = 2.6;
                        ctx.lineCap = 'round';
                        ctx.beginPath();
                        ctx.moveTo(-2, 6);
                        ctx.lineTo(6, -2);
                        ctx.moveTo(-7, 1);
                        ctx.quadraticCurveTo(-10, 4, -7, 7);
                        ctx.lineTo(-4, 10);
                        ctx.quadraticCurveTo(-1, 13, 2, 10);
                        ctx.moveTo(7, -1);
                        ctx.quadraticCurveTo(10, -4, 7, -7);
                        ctx.lineTo(4, -10);
                        ctx.quadraticCurveTo(1, -13, -2, -10);
                        ctx.stroke();
                }

                ctx.restore();

                // Dynamic Footer Branding Sync Inside Downloaded Canvas File
                const footerY = plateY + plateH + 46;
                ctx.fillStyle = '#6B6560';
                ctx.font = '500 14px Inter, sans-serif';
                ctx.fillText('Dibuat dengan 💖 oleh tdsquad · 2026', w / 2, footerY);

                ctx.restore(); // closes the clip region opened above

                // Reset the scale transform so subsequent downloads start clean
                ctx.setTransform(1, 0, 0, 1, 0, 0);

                // Immediate Auto Trigger Download Stream Action
                const downloadLink = document.createElement('a');
                downloadLink.download = `QR_${activeBrand.name.replace(/\s+/g, '_')}-${Date.now()}.png`;
                downloadLink.href = downloadCanvas.toDataURL('image/png');
                downloadLink.click();

                document.body.removeChild(qrExportHolder);
            }

            downloadBtn.addEventListener('click', function (e) {
                e.preventDefault();
                downloadDinamisPNG();
            });

            urlInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    generateBtn.click();
                }
            });
        })();

    </script>
</body>

</html>
